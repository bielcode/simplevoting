name: simplevoting
recipe: drupal10

config:
  php: '8.2'
  via: apache:2.4
  webroot: web
  database: mariadb:10.6
  drush: false
  xdebug: false

services:
  appserver:
    overrides:
      depends_on:
        database:
          condition: service_healthy
      environment:
        DB_NAME: ${DB_NAME:-drupal10}
        DB_USER: ${DB_USER:-drupal10}
        DB_PASSWORD: ${DB_PASSWORD:-drupal10}
        DB_HOST: ${DB_HOST:-database}
        DB_PORT: ${DB_PORT:-3306}
        DB_DRIVER: ${DB_DRIVER:-mysql}
        HASH_SALT: ${HASH_SALT:-lando-local-dev}

  database:
    type: mariadb:10.6
    portforward: true
    creds:
      user: ${DB_USER:-drupal10}
      password: ${DB_PASSWORD:-drupal10}
      database: ${DB_NAME:-drupal10}
    overrides:
      # start_period dá ao MariaDB tempo para inicializar o data directory
      # antes que as verificações de saúde comecem a contar falhas.
      healthcheck:
        test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 45s

  phpmyadmin:
    type: phpmyadmin
    hosts:
      - database

events:
  # Copia arquivos de exemplo antes de subir os containers.
  # pre-start roda no host, então usamos paths relativos ao projeto.
  pre-start:
    - cp -n .env.example .env || true
    - cp -n example.settings.local.php web/sites/default/settings.local.php || true

tooling:
  # drush aponta para o binário do Composer, não o global do Lando,
  # para garantir controle da versão via composer.json.
  drush:
    service: appserver
    cmd: /app/vendor/bin/drush --root=/app/web

  composer:
    service: appserver
    cmd: composer

  # Verifica o coding standard Drupal em todos os módulos e temas custom.
  # Uso: lando phpcs
  phpcs:
    service: appserver
    cmd: /app/vendor/bin/phpcs --standard=Drupal,DrupalPractice --extensions=php,module,inc,install,theme /app/web/modules/custom /app/web/themes/custom

  # Corrige automaticamente as violações que o phpcs detectar.
  # Uso: lando phpcbf
  phpcbf:
    service: appserver
    cmd: /app/vendor/bin/phpcbf --standard=Drupal,DrupalPractice --extensions=php,module,inc,install,theme /app/web/modules/custom /app/web/themes/custom

  # Roda os testes unitários do módulo simple_voting.
  # Não precisa de banco nem sessão — puro PHPUnit com mocks.
  # Uso: lando test-unit
  test-unit:
    service: appserver
    cmd: /app/vendor/bin/phpunit -c /app/web/modules/custom/simple_voting/phpunit.xml --testdox
