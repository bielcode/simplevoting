# ---------------------------------------------------------------------------
# API REST v1 — prefixo /api/voting/v1/
#
# Autenticação aceita via Basic Auth (Authorization: Basic) ou sessão Drupal
# (cookie). O bloco options._auth informa ao Authentication Manager quais
# providers tentar; se nenhum autenticar, Drupal desafia com 401.
#
# O _csrf_request_header_token no endpoint de voto convive sem conflito com
# basic_auth: o CsrfRequestHeaderAccessCheck verifica a presença de sessão
# antes de exigir o token, logo requisições stateless passam automaticamente.
# Clientes de sessão obtêm o token via GET /session/token.
# ---------------------------------------------------------------------------

simple_voting.api.questions:
  path: '/api/voting/v1/questions'
  defaults:
    _controller: '\Drupal\simple_voting\Controller\VotingApiController::getQuestions'
  methods: [GET]
  options:
    _auth: ['basic_auth', 'cookie']
  requirements:
    _permission: 'vote in polls'

simple_voting.api.question:
  path: '/api/voting/v1/questions/{id}'
  defaults:
    _controller: '\Drupal\simple_voting\Controller\VotingApiController::getQuestion'
  methods: [GET]
  options:
    _auth: ['basic_auth', 'cookie']
  requirements:
    _permission: 'vote in polls'

simple_voting.api.vote:
  path: '/api/voting/v1/votes'
  defaults:
    _controller: '\Drupal\simple_voting\Controller\VotingApiController::castVote'
  methods: [POST]
  options:
    _auth: ['basic_auth', 'cookie']
  requirements:
    _permission: 'vote in polls'
    _csrf_request_header_token: 'TRUE'

simple_voting.api.results:
  path: '/api/voting/v1/questions/{id}/results'
  defaults:
    _controller: '\Drupal\simple_voting\Controller\VotingApiController::getResults'
  methods: [GET]
  options:
    _auth: ['basic_auth', 'cookie']
  requirements:
    _permission: 'vote in polls'

simple_voting.settings_form:
  path: '/admin/config/simple-voting/settings'
  defaults:
    _form: '\Drupal\simple_voting\Form\VotingSettingsForm'
    _title: 'Simple Voting — Configurações'
  requirements:
    _permission: 'administer simple voting'

simple_voting.results:
  path: '/simple-voting/results/{question_id}'
  defaults:
    _controller: '\Drupal\simple_voting\Controller\VotingResultsController::results'
    _title_callback: '\Drupal\simple_voting\Controller\VotingResultsController::title'
  requirements:
    _permission: 'vote in polls'
